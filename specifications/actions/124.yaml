Specification:
  ID: 124
  Title: Assess Tooling Needs & Criteria
  Description: Run a needs-based assessment; define success criteria and constraints.
  Slug: 124-assess-tooling
  Implementation Types:
  - null
  Weight: 1.0
  Formula: |-
    * Weighted sum
    	Criteria document (score ×3),
    	KPI alignment (score ×3),
    	Stakeholder count capped at 5 (score ×2),
    	Refresh cadence (score ×2).
    * Criteria formally documented (0=None, 1=Draft, 2=Approved, 3=Versioned+Reviewed)
    * Criteria explicitly mapped to FinOps KPIs (0=None, 1=Partial, 2=Full)
    * of FinOps personas involved in criteria definition (0–5)
    * Criteria review frequency (0=Never, 1=Ad-hoc, 2=Annual, 3=Quarterly+)
    * Max Raw Score (31)
  Scoring:
  - Score: 9
    Condition: Low Maturity
  - Score: 18
    Condition: Developing
  - Score: 26
    Condition: Established
  - Score: 31
    Condition: Optimizing
  References:
  - Name: Maturity Definition
    Link: https://www.finops.org/framework/maturity-model/
    Comment: null
  Notes:
  - CRAWL (0–9) Tooling criteria are absent or informal, with no KPI mapping, no cross-functional input, and no review cadence. Decisions are ad-hoc or relationship-driven.
  - WALK (10–18) Criteria are documented and approved, with partial FinOps KPI alignment. A few personas are involved, and reviews are triggered by procurement needs rather than a set schedule.
  - RUN (19-26) Criteria are fully documented, approved, and mapped to FinOps KPIs across all dimensions. Four or more personas contribute, and reviews occur at least annually, making decisions auditable and repeatable.
  - FLY (27-31) Criteria are versioned under formal change control, fully traceable to KPIs, and shaped by all five FinOps personas. Quarterly reviews are often auto-triggered, and the criteria drive ongoing tool governance and continuous improvement.
  Overrides: null
  
