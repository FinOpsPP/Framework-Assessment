Specification:
  ID: 124
  Title: Assess Tooling Needs & Criteria
  Description: Run a needs-based assessment; define success criteria and constraints.
  Slug: 124-assess-tooling
  Implementation Types:
  - null
  Weight: 1.0
  Formula: |-
    * Weighted sum
      Criteria document (score x3),
      KPI alignment (score x3),
      Stakeholder count capped at 5 (score x2),
      Refresh cadence (score x2).
      Max Raw Score (31)
    * Criteria formally documented (0=None, 1=Draft, 2=Approved, 3=Versioned+Reviewed)
    * Criteria explicitly mapped to FinOps KPIs (0=None, 1=Partial, 2=Full)
    * of FinOps personas involved in criteria definition (0-5)
    * Criteria review frequency (0=Never, 1=Ad-hoc, 2=Annual, 3=Quarterly+)
    * Output Range (0 - Max Raw)
  Score Type: multi_bucket
  Scoring:
  - Score: 0
    Condition: Low Maturity (0-9)
  - Score: 4
    Condition: Developing (10-18)
  - Score: 7
    Condition: Established (19-26)
  - Score: 10
    Condition: Optimizing (27-31)
  References:
  - Name: Maturity Definition
    Link: https://www.finops.org/framework/maturity-model/
    Comment: null
  - Name: FinOps++ Score Type - Multiple Weighted Bucket
    Link: https://github.com/FinOpsPP/Framework-Assessment/blob/main/guidelines/scoring.md##multiple-weighted-buckets
    Comment: an even more granular version of bucket, where steps are weight by importance to an action.
  Supplemental Guidance:
  - |
    CRAWL (0-9) Criteria absent or informal. No KPI mapping, no cross-functional input,
    no review cadence. Decisions are ad-hoc.
  - |
    WALK (10-18) Criteria documented and approved. Partial KPI alignment, few personas
    involved, reviews triggered by procurement.
  - |
    RUN (19-26) Criteria fully documented and mapped to FinOps KPIs. 4+ personas
    contribute, reviewed annually, decisions auditable.
  - |
    FLY (27-31) Criteria versioned under change control. Full KPI traceability,
    all 5 personas involved, quarterly reviews, drives governance.
  Overrides: null
