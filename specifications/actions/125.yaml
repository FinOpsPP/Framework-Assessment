Specification:
  ID: 125
  Title: Evaluate Build vs Buy Options
  Description: Evaluate build vs buy; map requirements to vendor capabilities.
  Slug: 125-evaluate-build
  Implementation Types:
  - null
  Weight: 1.0
  Formula: |-
    * Weighted sum
    	TCO (score ×3),
    	Vendor scoring (score ×3),
    	Decision document (score ×3),
    	Rules established (score ×1).
    	Max raw = 50. Normalised to 0–10.
    * TCO_Analysis - Total Cost of Ownership analysis performed (0=None, 1=High-level, 2=Detailed, 3=Validated with Finance)
    * Vendor_Scored - Vendor options scored against criteria (0=None, 1=Informal, 2=Structured scorecard, 3=Multi-stakeholder RFP)
    * Decision_Doc - Build vs Buy decision formally documented and approved (0=No, 1=Informal note, 2=Formal doc, 3=Exec-approved+reviewed)
    * Rules_Est - Guiding rules / policy established for future decsions (0=No rules, 1=Draft, 2=Published+Enforced)
    * Output Range (0-10)
  Scoring:
  - Score: 0.0-3.9
    Condition: Crawl
  - Score: 4.0-6.9
    Condition: Walk
  - Score: 7.0-8.9
    Condition: Run
  - Score: 9.0-10.0
    Condition: Fly
    
