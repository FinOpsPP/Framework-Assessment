Specification:
  ID: 64
  Title: Implement Iteratively & Measure Results
  Description: Implement iteratively; test, measure, and capture before/after results.
  Slug: 64-iteratively-measure
  Implementation Types:
  - null
  Weight: 1.0
  Formula: |-
    * Implement architecture changes in time boxed iterations rather than big migrations
    * Track actual cost outcomes vs estimated savings documented in prior trade off analysis
    * Define and monitor success metrics (cost delta, performance, reliability) for each iteration
    * Hold structured retrospectives after each iteration to capture lessons learned
    * Feed iteration outcomes back into the modernisation backlog to reprioritise remaining work

